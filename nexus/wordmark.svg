<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="960" height="240">
  <title>Nexus Wordmark</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&amp;display=swap');
      .wm-text {
        font-family: 'Barlow Condensed', 'Futura', 'Century Gothic', 'Gill Sans', sans-serif;
        font-weight: 600;
        letter-spacing: 0.12em;
      }
    </style>
  </defs>
  <!-- Diamond ring mark, scaled to 64×64, placed at y=8 to sit center in 80px height -->
  <g transform="translate(8, 8) scale(0.64)">
    <path fill-rule="evenodd"
          d="M50,4 L96,50 L50,96 L4,50 Z M50,26 L74,50 L50,74 L26,50 Z"
          fill="#0C0C0C"/>
  </g>
  <!-- NEXUS text: mark right edge ≈ 8 + 96*0.64 = 69.4, gap 16 → x=86 -->
  <text class="wm-text"
        x="86" y="56"
        font-size="50"
        fill="#0C0C0C">NEXUS</text>
</svg>
